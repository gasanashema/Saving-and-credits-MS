version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ikibina_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ikibina_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Automatically initializes the schema and seeds on startup
      - ./backend/db/ikibina_app.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ikibina_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_NAME=ikibina_db
      - DB_PORT=3306
      - JWT_SECRET=PS_RG_25534_ysz-PRZ-TQG
      - MOMO_API_KEY=b944ea99e0f438d9d2cfd9b009b367283e3e2ba8b8bd285a1209abb0c1b06e24
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ikibina_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
